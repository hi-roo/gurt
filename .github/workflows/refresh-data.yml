name: Daten aktualisieren

# Aktualisiert die live-basierten Sanity-Datensätze (EU, Bundestag-DIP und den
# Chord der laufenden 21. WP — namentliche Abstimmungen via abgeordnetenwatch).
# Frontend zieht via ISR automatisch nach — kein Redeploy nötig.

on:
  schedule:
    - cron: "0 6 * * 1" # wöchentlich, Montag 06:00 UTC
  workflow_dispatch: {} # manuell auslösbar

# Patcht nur Sanity (externe API) — kein Schreibzugriff aufs Repo nötig.
permissions:
  contents: read

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Sanity-Datensätze aktualisieren
        run: pnpm refresh:data
        env:
          SANITY_WRITE_TOKEN: ${{ secrets.SANITY_WRITE_TOKEN }}
          DIP_API_KEY: ${{ secrets.DIP_API_KEY }}
