name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck · Lint · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Anführungszeichen (Typografie-Gate)
        run: pnpm check:quotes

      - name: Test
        run: pnpm test

      # Im Sanity-Modus bauen (wie Vercel) — fängt SSG-/draftMode-/Fetch-Fehler ab,
      # die der Seed-Modus verdeckt. projectId/dataset sind öffentlich; Read via Secret.
      - name: Build (Sanity-Modus, wie Produktion)
        run: pnpm build
        env:
          NEXT_PUBLIC_SANITY_PROJECT_ID: nfndwwt2
          NEXT_PUBLIC_SANITY_DATASET: production
          NEXT_PUBLIC_SANITY_API_VERSION: "2025-01-01"
          SANITY_API_READ_TOKEN: ${{ secrets.SANITY_WRITE_TOKEN }}
