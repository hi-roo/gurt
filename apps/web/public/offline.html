<!doctype html>
<html lang="de">
  <head>

    <title>Offline · GURT</title>
    <style>

      body {
        margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;

        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      }
      .mark { font-weight: 700; letter-spacing: -0.02em; font-size: 1.5rem; }

      @media (prefers-color-scheme: dark) {
        body { background: #0c111d; color: #f1e8da; }
        p { color: #9aa6b2; }
        a { color: #f2852c; }
      }

  </head>
  <body>
    <main>
      <div class="mark">GURT</div>
      <h1>Du bist offline</h1>
